name: CI/CD

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: dillsh/ci-cd-templates/.github/workflows/python-ci.yml@main
    with:
      test_path: tests/

  deploy:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    uses: dillsh/ci-cd-templates/.github/workflows/deploy.yml@main
    with:
      service_name: vulnctl
      version: ${{ github.ref_name }}
    secrets:
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
