name: Release binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: vulnctl-linux-amd64
          - os: macos-14
            artifact: vulnctl-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Inject server config
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          python - <<'EOF'
          import os
          host = os.environ.get("DEPLOY_HOST", "SERVER_IP")
          with open("src/cli/_constants.py", "w") as f:
              f.write(f'CVE_CORE_HTTP_HOST = "{host}"\n')
              f.write(f'CVE_CORE_HTTP_PORT = 8080\n')
          EOF

      - name: Build binary
        run: uv run pyinstaller vulnctl.spec

      - name: Rename artifact
        run: mv dist/vulnctl dist/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
